<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>SeedMaster</title>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0/dist/chartjs-plugin-annotation.min.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    </head>
    <body>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            font-family: "figtree", sans-serif;
            box-sizing: border-box;
        }
        body {
            margin: 0px;
            overflow-x: hidden;
            background-color: var(--bg1);
        }
        :root {
            --accentbg: #4285F4;
        }
        button {
            height: 48px;
            padding: 0px 22px;
            display: flex;
            align-items: center;
            column-gap: 7px;
            font-size: 16px;
            font-weight: 650;
            letter-spacing: -0.3px;
            border-radius: 8px;
            background-color: var(--txt1);
            color: var(--bg1);
            cursor: pointer;
            border: none;
            outline: none;
            width: fit-content;
            user-select: none;
        }
        button:hover {
            background-color: var(--txt2);
        }
        button svg {
            height: 18px;
            width: 18px;
        }
        .setup {
            width: 100%;
        }
        .main-wrapper {
            width: 100%;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 500px;
        }
        .setup-content {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 48px 40px;
            width: 100%;
        }
        .setup-panel {
            background-color: var(--bg1);
            border: 1px solid var(--str2);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            row-gap: 24px;
        }
        .setup-logo {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            background-color: #141414;
            color: white;
            display: grid;
            place-items: center;
            margin-bottom: 8px;
        }
        .setup-logo svg {
            width: 32px;
            height: 32px;
        }
        .setup-panel-header {
            display: flex;
            flex-direction: column;
            row-gap: 8px;
        }
        .setup-panel-header h1.sheet-title {
            margin: 0px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--txt1);
        }
        .setup-panel-header p.sheet-subtitle {
            margin: 0px;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.45;
            letter-spacing: -0.2px;
            color: var(--txt2);
        }
        .action-buttons {
            display: flex;
            column-gap: 12px;
            justify-content: center;
            width: 100%;
        }
        .main-progress-container {
            display: flex;
            flex-direction: column;
            row-gap: 8px;
            width: 100%;
            margin-top: 8px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: var(--txt2);
        }
        .progress-bar-track {
            width: 100%;
            height: 8px;
            background-color: var(--bg2);
            border-radius: 9999px;
            border: 1px solid var(--str2);
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--txt1);
            border-radius: 9999px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .side-menu {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-left: 1px solid var(--str2);
            background-color: var(--bg2);
        }

        #terminal {
            flex-grow: 1;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: var(--bg2);
            padding: 24px 32px;
            text-align: left;
            font-family: "JetBrains Mono", monospace;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.02);
            height: 100%;
        }
        #terminal > a {
            display: block;
            font-weight: 500;
            font-size: 13px;
            font-family: "JetBrains Mono", monospace;
            color: var(--txt2);
            margin: 0px;
            padding: 4px 0px;
            line-height: 1.5;
            word-break: break-all;
            border-bottom: 1px solid rgba(var(--rgb), 0.03);
        }
        #terminal > a[title] {
            font-weight: 700;
            color: var(--txt1);
            font-size: 14px;
            border-bottom: none;
            margin-top: 8px;
        }
        #terminal > a[error] {
            font-weight: 700;
            color: #ff4a4a;
        }
        #terminal > a[success] {
            font-weight: 700;
            color: #2ec866;
        }
        #terminal > a[link] {
            color: var(--accentbg);
            text-decoration: underline;
        }
        @media (max-width: 950px) {
            .main-wrapper {
                grid-template-columns: 1fr;
            }
            .side-menu {
                border-left: none;
                border-top: 1px solid var(--str2);
                height: 500px;
            }
        }
    </style>

    <div class="setup">
        <div class="main-wrapper">
            <div class="setup-content">
                <div class="setup-panel">
                    <div class="setup-logo">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 7V4C4 3.44772 4.44772 3 5 3H19C19.5523 3 20 3.44772 20 4V7M4 17V20C4 20.5523 4.44772 21 5 21H19C19.5523 21 20 20.5523 20 20V17M4 12H20M20 7V17M4 7V17" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="setup-panel-header">
                        <h1 class="sheet-title">Annual Setup</h1>
                        <p class="sheet-subtitle">Scrape upcoming meet dates and division teams from MyNVSL</p>
                    </div>

                    <div class="action-buttons">
                        <button id="scrape-btn" onclick="start_scraping()">
                            <div>Start Scraping</div>
                        </button>
                    </div>

                    <div class="main-progress-container" id="main-progress-container" style="display: none;">
                        <div class="progress-info">
                            <span id="progress-status">Initializing...</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="progress-bar-track">
                            <div id="main-progress-fill" class="progress-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="side-menu">

                <div id="terminal">
                    <a title="System Ready">
                        Welcome to SeedMaster!
                        <br><br>
                        Click "Start Scraping" on the left to begin gathering division teams and meet schedule dates from MyNVSL. Status updates and detailed execution logs will appear here in real-time.
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function get_url(url, check_year = true) {
            var response = await fetch(`/api/fetch-html?url=${encodeURIComponent(url)}`);
            var html = await response.text();
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, "text/html");
            var has_year_in_url = new URL(url).searchParams.has("year");
            if (check_year && !has_year_in_url && doc.querySelector("select[name='year']").value.trim() == "") {
                return null
            } else {
                return doc;
            }
        }
        var current_phase = 'idle';


        async function start_scraping() {
            const btn = document.getElementById("scrape-btn");
            btn.disabled = true;
            btn.style.opacity = "0.6";
            btn.style.cursor = "not-allowed";
            btn.querySelector("div").innerText = "Scraping...";

            const term = document.querySelector("#terminal");
            term.innerHTML = "";

            const progContainer = document.getElementById("main-progress-container");
            progContainer.style.display = "flex";
            progress(0);

            try {
                // Phase 1: Schedule Scraping
                await scrape_schedule();

                // Phase 2: Teams Scraping
                await scrape_teams();

                current_phase = 'idle';
                document.querySelector("#main-progress-fill").style.width = "100%";
                document.querySelector("#progress-percent").innerText = "100%";
                document.querySelector("#progress-status").innerText = "Scraping Completed!";
                log("<br>All tasks completed successfully!", "success");
            } catch (err) {
                console.error(err);
                current_phase = 'idle';
                document.querySelector("#progress-status").innerText = "Error encountered.";
                log("<br>Setup encountered an error: " + err.message, "error");
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
                btn.querySelector("div").innerText = "Start Scraping";
            }
        }

        function log(message, type = false) {
            var a = document.createElement("A");
            if (type) {
                a.setAttribute(type, "");
            }
            if (type == "link") {
                a.setAttribute("href", message);
                a.setAttribute("target", "_blank");
            }

            a.innerHTML = message.charAt(0).toUpperCase() + message.slice(1);
            document.querySelector("#terminal").append(a);
            document.querySelector("#terminal").scrollTop = document.querySelector("#terminal").scrollHeight;
        }
        function progress(decimal) {
            let overall = 0;
            let status = "";
            if (current_phase === 'schedule') {
                overall = decimal * 0.2; // 0% to 20%
                status = `Scraping Schedule: ${Math.round(decimal * 100)}%`;
            } else if (current_phase === 'teams') {
                overall = 0.2 + (decimal * 0.8); // 20% to 100%
                status = `Scraping Teams: ${Math.round(decimal * 100)}%`;
            } else {
                overall = decimal;
                status = "Initializing...";
            }
            
            document.querySelector("#main-progress-fill").style.width = Math.min(Math.max(0, (overall * 100)), 100) + "%";
            document.querySelector("#progress-percent").innerText = Math.round(overall * 100) + "%";
            document.querySelector("#progress-status").innerText = status;
        }
        async function scrape_schedule() {
            current_phase = 'schedule';
            log("<br>Scraping Schedule", "success");
            log("<br>");
            progress(0);
            let schedule = {};
            var this_year = Number(new Date().getFullYear());

            let months = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];

            var loop_length = 20;
            for (let i = 0; i < loop_length; i++) {
                var year = this_year - i;
                var nvsl_url = `https://www.mynvsl.com/schedules?year=${year}&div=1&date=`;
                log("Year: " + year, "title");
                log(nvsl_url, "link");

                var doc = await get_url(nvsl_url, year);
                if (doc != null) {
                    schedule[year] = [];
                    var results = doc.querySelector("#league_schedules").querySelectorAll("h6");
                    for (let i = 0; i < results.length; i++) {
                        var header = results[i].innerText.toLowerCase().split(",");
                        var day = header[0].trim();
                        if (day == "saturday") {
                            var month_date = header[1].trim().split(" ");
                            var month = month_date[0];
                            var date = month_date[1];

                            var year_date = String(year).substring(2, 4);
                            var month_date = months.indexOf(month) + 1;
                            var date_string = month_date + "/" + date + "/" + year_date;

                            schedule[year].push(date_string);
                            log(results[i].innerText + ": " + date_string);
                        }

                        if (schedule[year].length >= 5) {
                            break;
                        }
                    }

                    log("<br>");
                    progress((i + 1) / loop_length);
                }
            }

            console.log(schedule);
            await save_file(schedule, "schedule");
        }
        async function scrape_teams() {
            current_phase = 'teams';
            log("<br>Scraping Teams", "success");
            progress(0);
            let teams = {};
            var this_year = Number(new Date().getFullYear());

            var nvsl_url = "https://www.mynvsl.com/standings";
            var doc = await get_url(nvsl_url);
            var results = doc.querySelectorAll("table");
            results.forEach(table => {
                var division = table.querySelector("th").innerText.replace(/[^0-9]/g, "");
                teams[division] = {};

                var rows = table.querySelectorAll("tr");
                for (let a = 1; a < rows.length; a++) {
                    var name = rows[a].querySelector("a").innerText.trim();
                    teams[division][name] = {"id": "unset", "abr": null};
                }
            })

            var loop_length = 400;
            id_loop: for (let i = 0; i < loop_length; i++) {
                log("<br>");
                progress((i + 1) / loop_length);

                var nvsl_url = `https://www.mynvsl.com/leaders?post=1&mt=0&age=1&sex=1&st=1&stroke=25-free&m=1&year=${this_year}&count=25&division=&team=${i}`;
                log("Team id: " + i, "title");
                log(nvsl_url, "link");

                var doc = await get_url(nvsl_url, this_year);
                if (doc != null) {
                    var team_value = doc.querySelector("select[name='team']").value.trim();
                    if (team_value != "") {
                        var team_name = doc.querySelector("select[name='team']").querySelector("option[value='" + i + "']").innerText.trim();

                        for (let division of Object.keys(teams)) {
                            if (teams[division][team_name]) {
                                var nvsl_url = `https://www.mynvsl.com/leaders?post=1&mt=0&age=2&sex=0&st=1&stroke=50-free&m=1&year=${this_year}&count=25&division=&team=${i}`;
                                var doc = await get_url(nvsl_url);

                                try {
                                    var abbreviation = doc.querySelector("tr[class]").querySelectorAll("td")[4].innerText.trim();
                                } catch {
                                    var abbreviation = null;
                                }

                                teams[division][team_name] = {"id": i, "abr": abbreviation};
                                log(`Found: ${team_name} | (${abbreviation})`, "success");
                                continue id_loop;
                            }
                        }
                        log("Unable to match team with standings list", "error");
                    } else {
                        log("Nothing Found");
                    }
                }
            }

            var missing_ids = [];
            var missing_abr = [];
            for (let division of Object.keys(teams)) {
                for (let team of Object.keys(teams[division])) {
                    if (teams[division][team]["id"] == "unset") {
                        missing_ids.push(team);
                    } else if (teams[division][team]["abr"] == null) {
                        missing_abr.push(team);
                    }
                }
            }

            if (missing_ids.length > 0) {
                log("<br>Missing ids from: " + missing_ids.join(", ") + "<br><br>", "error");
            }
            if (missing_abr.length > 0) {
                log("<br>Missing abbreviations from: " + missing_abr.join(", ") + "<br><br>", "error");
            }

            console.log(teams);
            await save_file(teams, "teams");
        }
        async function save_file(jsonObject, filename) {
            try {
                const response = await fetch('/api/save-json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        data: jsonObject,
                        filename: filename + ".json"
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                log(filename + " saved successfully", "success");
                return result;
            } catch (error) {
                log("Error Saving" + filename, "title");
                console.error('Error saving file:', error);
                throw error;
            }
        }
        function dark_theme() {
            document.querySelector(":root").style.setProperty("--bg1", "#161616");
            document.querySelector(":root").style.setProperty("--bg2", "#202020");
            document.querySelector(":root").style.setProperty("--bg3", "#686868");

            document.querySelector(":root").style.setProperty("--str1", "#282828");
            document.querySelector(":root").style.setProperty("--str2", "#313131");

            document.querySelector(":root").style.setProperty("--txt1", "white");
            document.querySelector(":root").style.setProperty("--txt2", "hsl(0, 0%, 80%)");
            document.querySelector(":root").style.setProperty("--txt3", "grey");

            document.querySelector(":root").style.setProperty("--rgb", "255, 255, 255");
            document.querySelector(":root").style.setProperty("--highlight", "#1f2846");
            document.querySelector(":root").style.setProperty("--disabled", "#4a262f");

            document.documentElement.style.colorScheme = "dark";
        }
        function light_theme() {
            document.querySelector(":root").style.setProperty("--bg1", "#FFFFFF");
            document.querySelector(":root").style.setProperty("--bg2", "#FAFAFA");
            document.querySelector(":root").style.setProperty("--bg3", "#C1C1C1");

            document.querySelector(":root").style.setProperty("--str1", "#EEEEEE");
            document.querySelector(":root").style.setProperty("--str2", "#E4E4E4");

            document.querySelector(":root").style.setProperty("--txt1", "black");
            document.querySelector(":root").style.setProperty("--txt2", "#444444");

            document.querySelector(":root").style.setProperty("--rgb", "0, 0, 0");
            document.querySelector(":root").style.setProperty("--highlight", "#d9e7fd");
            document.querySelector(":root").style.setProperty("--disabled", "#ffcccc");

            document.documentElement.style.colorScheme = "light";
        }
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            dark_theme();
        } else {
            light_theme();
        }
    </script>
    </body>
</html>
