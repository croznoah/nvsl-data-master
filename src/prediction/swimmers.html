<style>
    * {
        -webkit-tap-highlight-color: transparent;
        font-family: "figtree", sans-serif;
        box-sizing: border-box;
    }
    body {
        margin: 0px;
        overflow: hidden;
        height: 100dvh;
        width: 100dvw;
        display: grid;
        place-items: center;
    }
    :root {
        --accentbg: #4285F4;
        --highlight1: #39d38c;
        --highlight2: #395fd3;
    }
    h1 {
        color: var(--txt1);
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.4px;
        margin-block: 40px;
        text-align: center;
    }
    button {
        flex: none;
        height: 48px;
        padding: 0px 22px;
        display: flex;
        align-items: center;
        column-gap: 7px;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: -0.3px;
        border-radius: 8px;
        background-color: var(--txt1);
        color: var(--bg1);
        cursor: pointer;
        border: none;
        outline: none;
        width: 300px;
        justify-content: center;
        user-select: none;
        margin: 20px auto;
    }
    button:hover {
        background-color: var(--txt2);
    }
    button svg {
        height: 18px;
        width: 18px;
    }
    .wrapper {
        background-color: var(--bg2);
        width: 100%;
        max-width: 450px;
        border-radius: 5px;
        border: 1px solid var(--str2);
    }
    .option {
        height: 50px;
        padding: 0px 16px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--str2);
        cursor: pointer;
        font-weight: 650;
        letter-spacing: -0.3px;
        color: var(--txt2);
    }
    .option:hover {
        background-color: var(--bg2);
    }
    .option:last-child {
        border-bottom: none;
    }
    a.option {
        height: 75px;
        color: var(--accentbg);
    }
    div.option:first-of-type {
        border-top: 1px solid var(--str2);
    }
    .option[active="true"] {
        background-color: var(--txt1);
        color: var(--bg1);
        font-weight: 700;
    }
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
        20%, 40%, 60%, 80% { transform: translateX(4px); }
    }
    *[locked] {
        animation: shake 0.5s ease-in-out;
    }
    #progress, #total, #overall {
        font-feature-settings: "tnum";
    }
    #progress-wrapper, #success-wrapper {
        div.option {
            cursor: unset;
        }
        div.option:hover {
            background-color: transparent;
        }
    }
    .check-icon {
        display: block;
        height: 80px;
        width: 80px;
        color: white;
        background-color: #59b259;
        padding: 20px;
        border-radius: 12px;
        margin: 40px auto;
        margin-bottom: -20px;
    }
</style>

<div class="wrapper" id="select-wrapper">
    <h1>Scrape Swimmers</h1>
    <button id="start-btn" onclick="start_scraping()">
        <div>
            Start Scraping
        </div>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 9H2M6 17.5L8.5 15L6 12.5M11 17.5L15 17.5M2 7.8L2 16.2C2 17.8802 2 18.7202 2.32698 19.362C2.6146 19.9265 3.07354 20.3854 3.63803 20.673C4.27976 21 5.11984 21 6.8 21H17.2C18.8802 21 19.7202 21 20.362 20.673C20.9265 20.3854 21.3854 19.9265 21.673 19.362C22 18.7202 22 17.8802 22 16.2V7.8C22 6.11984 22 5.27977 21.673 4.63803C21.3854 4.07354 20.9265 3.6146 20.362 3.32698C19.7202 3 18.8802 3 17.2 3L6.8 3C5.11984 3 4.27976 3 3.63803 3.32698C3.07354 3.6146 2.6146 4.07354 2.32698 4.63803C2 5.27976 2 6.11984 2 7.8Z" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
</div>

<div class="wrapper" id="progress-wrapper" style="display: none;">
    <h1 id="progress">0.00%</h1>
    <div class="option" id="total"></div>
    <div class="option" id="overall"></div>
    <a class="option" id="url" target="_blank"></a>
    <button id="pause-btn" onclick="pause_collection()">
        <div>
            Pause
        </div>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 21V3M17 21V3" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
    <button id="resume-btn" onclick="resume_collection()" style="display: none;">
        <div>
            Resume
        </div>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 4.98951C5 4.01835 5 3.53277 5.20249 3.2651C5.37889 3.03191 5.64852 2.88761 5.9404 2.87018C6.27544 2.85017 6.67946 3.11953 7.48752 3.65823L18.0031 10.6686C18.6708 11.1137 19.0046 11.3363 19.1209 11.6168C19.2227 11.8621 19.2227 12.1377 19.1209 12.383C19.0046 12.6635 18.6708 12.886 18.0031 13.3312L7.48752 20.3415C6.67946 20.8802 6.27544 21.1496 5.9404 21.1296C5.64852 21.1122 5.37889 20.9679 5.20249 20.7347C5 20.467 5 19.9814 5 19.0103V4.98951Z" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
</div>

<div class="wrapper" id="success-wrapper" style="display: none;">
    <span class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 12L11 14L15.5 9.5M17.9012 4.99851C18.1071 5.49653 18.5024 5.8924 19.0001 6.09907L20.7452 6.82198C21.2433 7.02828 21.639 7.42399 21.8453 7.92206C22.0516 8.42012 22.0516 8.97974 21.8453 9.47781L21.1229 11.2218C20.9165 11.7201 20.9162 12.2803 21.1236 12.7783L21.8447 14.5218C21.9469 14.7685 21.9996 15.0329 21.9996 15.2999C21.9997 15.567 21.9471 15.8314 21.8449 16.0781C21.7427 16.3249 21.5929 16.549 21.4041 16.7378C21.2152 16.9266 20.991 17.0764 20.7443 17.1785L19.0004 17.9009C18.5023 18.1068 18.1065 18.5021 17.8998 18.9998L17.1769 20.745C16.9706 21.2431 16.575 21.6388 16.0769 21.8451C15.5789 22.0514 15.0193 22.0514 14.5212 21.8451L12.7773 21.1227C12.2792 20.9169 11.7198 20.9173 11.2221 21.1239L9.47689 21.8458C8.97912 22.0516 8.42001 22.0514 7.92237 21.8453C7.42473 21.6391 7.02925 21.2439 6.82281 20.7464L6.09972 19.0006C5.8938 18.5026 5.49854 18.1067 5.00085 17.9L3.25566 17.1771C2.75783 16.9709 2.36226 16.5754 2.15588 16.0777C1.94951 15.5799 1.94923 15.0205 2.1551 14.5225L2.87746 12.7786C3.08325 12.2805 3.08283 11.7211 2.8763 11.2233L2.15497 9.47678C2.0527 9.2301 2.00004 8.96568 2 8.69863C1.99996 8.43159 2.05253 8.16715 2.15472 7.92043C2.25691 7.67372 2.40671 7.44955 2.59557 7.26075C2.78442 7.07195 3.00862 6.92222 3.25537 6.8201L4.9993 6.09772C5.49687 5.89197 5.89248 5.4972 6.0993 5.00006L6.82218 3.25481C7.02848 2.75674 7.42418 2.36103 7.92222 2.15473C8.42027 1.94842 8.97987 1.94842 9.47792 2.15473L11.2218 2.87712C11.7199 3.08291 12.2793 3.08249 12.7771 2.87595L14.523 2.15585C15.021 1.94966 15.5804 1.9497 16.0784 2.15597C16.5763 2.36223 16.972 2.75783 17.1783 3.25576L17.9014 5.00153L17.9012 4.99851Z" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </span>
    <h1>Scraping Complete</h1>
    <div class="option" id="results">0 Points found</div>
    <div class="option">File saved successfully</div>
    <button id="start-btn" onclick="window.location.reload()">
        <div>
            Start Over
        </div>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 10C2 10 4.00498 7.26822 5.63384 5.63824C7.26269 4.00827 9.5136 3 12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21C7.89691 21 4.43511 18.2543 3.35177 14.5M2 10V4M2 10H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
</div>

<script>
    function dark_theme() {
        document.querySelector(":root").style.setProperty("--bg1", "#161616");
        document.querySelector(":root").style.setProperty("--bg2", "#202020");
        document.querySelector(":root").style.setProperty("--bg3", "#686868");
        document.querySelector(":root").style.setProperty("--str1", "#282828");
        document.querySelector(":root").style.setProperty("--str2", "#313131");
        document.querySelector(":root").style.setProperty("--txt1", "white");
        document.querySelector(":root").style.setProperty("--txt2", "hsl(0, 0%, 80%)");
        document.documentElement.style.colorScheme = "dark";
    }
    function light_theme() {
        document.querySelector(":root").style.setProperty("--bg1", "#FFFFFF");
        document.querySelector(":root").style.setProperty("--bg2", "#FAFAFA");
        document.querySelector(":root").style.setProperty("--bg3", "#C1C1C1");
        document.querySelector(":root").style.setProperty("--str1", "#EEEEEE");
        document.querySelector(":root").style.setProperty("--str2", "#E4E4E4");
        document.querySelector(":root").style.setProperty("--txt1", "black");
        document.querySelector(":root").style.setProperty("--txt2", "#444444");
        document.documentElement.style.colorScheme = "light";
    }
    function init_theme() {
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            dark_theme();
        } else {
            light_theme();
        }
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", event => {
            if (event["matches"]) {
                dark_theme();
            } else {
                light_theme();
            }
        });
    }
    init_theme();

    var fetching = {"running": true};

    async function save_file(jsonObject, filename) {
        try {
            const response = await fetch("/api/save-json", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    data: jsonObject,
                    filename: filename + ".json"
                })
            });
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            console.error("Error saving file:", error);
            throw error;
        }
    }

    async function get_url(url) {
        try {
            var response = await fetch(`/api/fetch-html?url=${encodeURIComponent(url)}`);
            var html = await response.text();
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, "text/html");
            if (doc.querySelector("select[name='year']")?.value.trim() == "") {
                return null
            } else {
                return doc;
            }
        } catch {
            console.log("Nothing here", url);
            return null;
        }
    }

    async function start_scraping() {
        document.querySelector("#select-wrapper").style.display = "none";
        document.querySelector("#progress-wrapper").style.display = "";
        fetching["running"] = true;

        const response = await fetch("/files/teams.json");
        const raw_teams = await response.json();
        const teams = [];
        for (const division of Object.keys(raw_teams)) {
            for (const team_name of Object.keys(raw_teams[division])) {
                teams.push(raw_teams[division][team_name]);
            }
        }

        const this_year = Number(new Date().getFullYear());
        const years = [];
        for (let i = this_year - 1; i >= 2003; i--) {
            years.push(i);
        }

        const genders = {"male": 1, "female": 2};
        const ages = {"9": 1, "11": 2};
        const strokes = ["free", "back", "breast", "fly"];
        let progress = 0;
        const total = teams.length * years.length * Object.keys(genders).length * Object.keys(ages).length * strokes.length;
        // Changed to an object of Sets to store IDs by gender
        swimmer_ids = {
            "boys": new Set(),
            "girls": new Set()
        };

        for (const team_details of teams) {
            if (fetching["running"] == false) break;
            for (const year of years) {
                if (fetching["running"] == false) break;
                for (const gender of Object.keys(genders)) {
                    if (fetching["running"] == false) break;
                    for (const age of Object.keys(ages)) {
                        if (fetching["running"] == false) break;
                        for (const stroke of strokes) {
                            if (fetching["running"] == false) break;

                            const nvsl_url = `https://www.mynvsl.com/leaders?post=1&mt=0&age=${ages[age]}&sex=${genders[gender]}&st=1&stroke=25-${stroke}&m=1&year=${year}&count=100&division=&team=${team_details["id"]}`;
                            document.querySelector("#url").innerText = nvsl_url;
                            document.querySelector("#url").href = nvsl_url;

                            const doc = await get_url(nvsl_url);
                            if (doc != null && doc.querySelector("table")) {
                                const results = doc.querySelector("table").querySelectorAll("tr:not([class*='hidden']):not([class*='record'])");
                                for (let i = 1; i < results.length; i++) {
                                    const row_element = results[i];
                                    const onclick_attr = row_element.querySelector("a").getAttribute("onclick");
                                    const onclick_match = onclick_attr.match(/showSwimmer\('(\d+)'\)/);
                                    const id = onclick_match ? onclick_match[1] : null;
                                    // Add ID to the correct set based on the current gender
                                    if (id) {
                                        if (gender === "male") {
                                            swimmer_ids["boys"].add(id);
                                        } else {
                                            swimmer_ids["girls"].add(id);
                                        }
                                    }
                                }
                            }
                            progress++;
                            // Update progress with total from both genders
                            const total_found = swimmer_ids["boys"].size + swimmer_ids["girls"].size;
                            document.querySelector("#total").innerText = `Found: ${total_found} swimmers`;
                            document.querySelector("#progress").innerText = `${(Math.round((progress / total) * 10000) / 100).toFixed(2)}%`;
                            document.querySelector("#overall").innerText = `${progress} / ${total}`;
                        }
                    }
                }
            }
        }

        if (fetching["running"]) {
            const ids_to_save = {
                "boys": [...swimmer_ids["boys"]],
                "girls": [...swimmer_ids["girls"]]
            };
            await save_file(ids_to_save, "all-swimmers.json");

            document.querySelector("#progress-wrapper").style.display = "none";
            document.querySelector("#success-wrapper").style.display = "";

            const total_boys = swimmer_ids["boys"].size;
            const total_girls = swimmer_ids["girls"].size;
            document.querySelector("#results").innerText = `Found ${total_boys + total_girls} swimmers (${total_boys} boys, ${total_girls} girls)`;
        }
        fetching["running"] = false;
    }

    function pause_collection() {
        document.querySelector("#pause-btn").style.display = "none";
        document.querySelector("#resume-btn").style.display = "";
        fetching["running"] = false;
    }

    function resume_collection() {
        document.querySelector("#pause-btn").style.display = "";
        document.querySelector("#resume-btn").style.display = "none";
        start_scraping();
    }
</script>
